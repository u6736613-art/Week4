<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Form Render Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 13px;
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
        }

        form {
            max-width: 800px;
            margin: 0 auto;
        }

        fieldset {
            border: 1px solid #c0c0c0;
            border-radius: 4px;
            padding: 15px 20px;
            margin-bottom: 15px;
        }

        legend {
            font-size: 13px;
            padding: 0 5px;
        }

        .form-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .form-group label.field-label {
            width: 150px;
            min-width: 150px;
            padding-top: 3px;
        }

        /* Input styling to match layout */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        select,
        textarea {
            width: 250px;
            padding: 4px;
            border: 1px solid #767676;
            border-radius: 2px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            width: 100%;
            max-width: 600px;
            height: 120px;
            resize: vertical;
        }

        /* Checkbox and Radio inline layouts */
        .inline-options {
            display: flex;
            gap: 15px;
            align-items: center;
            padding-top: 3px;
        }

        .inline-options label {
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
        }

        /* Footer / Submit Button area */
        .form-footer {
            max-width: 800px;
            margin: 0 auto;
            text-align: right;
        }

        button[type="submit"] {
            background-color: #0000ff;
            color: #ffffff;
            border: none;
            padding: 6px 16px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background-color: #0000cc;
        }
    </style>
</head>
